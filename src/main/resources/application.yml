spring:
  application:
    name: claimsflow360
  profiles:
    default: dev

  datasource:
    url: jdbc:mysql://localhost:3306/claimsflow?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: claims
    password: claims
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        jdbc:
          time_zone: UTC
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  security:
    oauth2:
      resourceserver:
        jwt:
          # Replace with real Cognito issuer-uri in production.
          # For local dev, JWTs are validated via HS256 symmetric secret (see SecurityConfig).
          issuer-uri: ""

server:
  port: 8080
  error:
    include-message: always

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: when_authorized

# ─── Resilience4j ────────────────────────────────────────────────────────────
resilience4j:
  circuitbreaker:
    instances:
      bedrockSummarizer:
        registerHealthIndicator: true
        slidingWindowSize: 20
        minimumNumberOfCalls: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
  retry:
    instances:
      bedrockSummarizer:
        maxAttempts: 3
        waitDuration: 500ms
        exponentialBackoffMultiplier: 2

# ─── ClaimsFlow360 application config ────────────────────────────────────────
claimsflow:
  fraud:
    threshold: 70
    amount-high-threshold: 50000

  security:
    dev-mode: true
    jwt-secret: "dev-secret-change-me-this-must-be-at-least-256-bits-long-for-hmac"

  # ─── AWS (Week 2) ─────────────────────────────────────────────────────────
  aws:
    region: ap-south-1                          # change to your AWS region
    sqs:
      claims-events-queue-url: https://sqs.ap-south-1.amazonaws.com/123456789012/claimsflow-events.fifo

  opensearch:
    endpoint: http://localhost:9200             # local OpenSearch or AWS domain endpoint

  ai:
    bedrock:
      model-id: anthropic.claude-3-haiku-20240307-v1:0   # cost-optimised; swap to Sonnet for accuracy
      max-tokens: 500

  outbox:
    relay-interval-ms: 2000       # how often the relay scheduler polls outbox_events
    retry-interval-ms: 30000      # how often failed events are retried

logging:
  level:
    com.claimsflow: INFO
    org.hibernate.SQL: INFO
    software.amazon.awssdk: WARN   # suppress SDK debug noise
