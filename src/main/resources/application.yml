spring:
  application:
    name: claimsflow360
  profiles:
    default: dev

  datasource:
    url: jdbc:mysql://localhost:3306/claimsflow?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: claims
    password: claims
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        jdbc:
          time_zone: UTC
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  security:
    oauth2:
      resourceserver:
        jwt:
          # Replace with real issuer-uri (e.g. Cognito) in production.
          # For local dev, JWTs are validated via a static HMAC secret in SecurityConfig.
          issuer-uri: ""

server:
  port: 8080
  error:
    include-message: always

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, prometheus
  endpoint:
    health:
      show-details: when_authorized

resilience4j:
  circuitbreaker:
    instances:
      bedrockSummarizer:
        registerHealthIndicator: true
        slidingWindowSize: 20
        minimumNumberOfCalls: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 3
  retry:
    instances:
      bedrockSummarizer:
        maxAttempts: 3
        waitDuration: 500ms
        exponentialBackoffMultiplier: 2

logging:
  level:
    com.claimsflow: INFO
    org.hibernate.SQL: INFO

claimsflow:
  fraud:
    threshold: 70
    amount-high-threshold: 50000
  security:
    dev-mode: true
    jwt-secret: "dev-secret-change-me-this-must-be-at-least-256-bits-long-for-hmac"
