spring:
  datasource:
    url: jdbc:h2:mem:claimsflow;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false

claimsflow:
  fraud:
    threshold: 70
    amount-high-threshold: 50000
  security:
    dev-mode: true
    jwt-secret: "test-secret-change-me-this-must-be-at-least-256-bits-long-for-hmac"
  ai:
    bedrock:
      model-id: anthropic.claude-3-haiku-20240307-v1:0
      max-tokens: 500
  outbox:
    relay-interval-ms: 60000
    retry-interval-ms: 60000
  aws:
    region: ap-south-1
    sqs:
      claims-events-queue-url: https://sqs.ap-south-1.amazonaws.com/000000000000/test-queue.fifo
  opensearch:
    endpoint: http://localhost:9200
