spring:
  datasource:
    url: jdbc:h2:mem:claimsflow;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false

claimsflow:
  fraud:
    threshold: 70
    amount-high-threshold: 50000
  security:
    dev-mode: true
    jwt-secret: "test-secret-change-me-this-must-be-at-least-256-bits-long-for-hmac"
