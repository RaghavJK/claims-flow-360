version: "3.9"
# Local dev stack. Requires Docker Desktop.
# Week 1: only MySQL is needed. Redis + LocalStack added in later weeks.
services:
  mysql:
    image: mysql:8.4
    container_name: claimsflow-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: claimsflow
      MYSQL_USER: claims
      MYSQL_PASSWORD: claims
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
